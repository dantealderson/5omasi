<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خماسي - Khomasi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #673AB7, #9C27B0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: white;
            color: #673AB7;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        .loading { font-size: 14px; opacity: 0.7; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚽</div>
        <h1>خماسي</h1>
        <p>جاري فتح المباراة في التطبيق...</p>
        <a class="btn" id="openBtn" href="#">افتح التطبيق</a>
        <p class="loading" id="status"></p>
    </div>

    <script>
        const path = window.location.pathname;
        const matchId = path.split('/match/')[1];
        const deepLink = 'khomasi://match/' + (matchId || '');

        // Try to open the app automatically
        window.location.href = deepLink;

        // Set the button link as fallback
        document.getElementById('openBtn').href = deepLink;

        // If still on page after 2 seconds, app is probably not installed
        setTimeout(function() {
            document.getElementById('status').textContent =
                'التطبيق غير مثبت؟ حمّل تطبيق خماسي!';
        }, 2000);
    </script>
</body>
</html>
